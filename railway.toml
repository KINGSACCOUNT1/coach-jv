[build]
builder = "NIXPACKS"
buildCommand = "cd coachjvtech && pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd coachjvtech && python manage.py migrate && gunicorn cryptoplatform.wsgi:application"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
